        /* Banner de Destaques */

        .banner-track { display: flex; transition: transform 0.6s cubic-bezier(0.45, 0, 0.55, 1); }
        .banner-slide { min-width: 100%; height: 450px; display: flex; align-items: center; background: #080808; overflow: hidden; }

        .banner-info-horiz { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }

        /* Grid de Produtos */
        .category-row { margin-bottom: 40px; }
        .category-title { font-size: 0.9rem; margin: 0 5% 15px 5%; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 10px; font-weight: 800; }
        .grid-fixed { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 5%; }
        .product { background: var(--card-bg); border: 1px solid #1a1a1a; padding: 10px; border-radius: var(--border-val); cursor: pointer; position: relative; }

        .product img { width: 100%; height: 100%; object-fit: cover; }

        .price { font-weight: 800; font-size: 0.85rem; color: #fff; display: block; margin-bottom: 10px; }

        /* MODAL (POP-UP) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #111; width: 100%; max-width: 400px; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #333; display: flex; flex-direction: column; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; color: #fff; z-index: 10; cursor: pointer; background: rgba(0,0,0,0.5); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        .modal-sizes input { display: none; }
        .modal-sizes label { padding: 10px 15px; border: 1px solid #333; cursor: pointer; font-size: 0.8rem; border-radius: 4px; min-width: 45px; }

        .modal-actions { display: flex; flex-direction: column; gap: 10px; }
        .btn-buy { width: 100%; padding: 18px; background: #fff; color: #000; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 4px; }
        .btn-cart-modal { width: 100%; padding: 15px; background: #222; color: #fff; border: 1px solid #333; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 4px; }

</head>

        ["cartier/cartier funcional.jpg", "Cartier Funcional", 219.90]
    ]
};

let products = [];
Object.keys(pastas).forEach(cat => { if(cat !== 'destaques') pastas[cat].forEach(p => products.push([...p, cat])); });

let cartItems = [];

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
function toggleCart() { document.getElementById('cart').classList.toggle('show'); document.getElementById('overlay').classList.toggle('active'); }
function closeAll() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('cart').classList.remove('show'); document.getElementById('productModal').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }

function openModal(index) {
    const p = products[index];
    document.getElementById('modalImg').src = p[0];
    document.getElementById('modalTitle').innerText = p[1];
    document.getElementById('modalPrice').innerText = `R$ ${p[2].toFixed(2).replace('.',',')}`;
    
    let sizes = (p[3] === 'tenis' || p[3] === 'calcas') ? ['38','39','40','41','42','43'] : (['joias','relogios'].includes(p[3]) ? ['Único'] : ['P','M','G','GG']);
    document.getElementById('modalSizes').innerHTML = sizes.map(s => `<input type="radio" name="sz" id="s${s}" value="${s}"><label for="s${s}">${s}</label>`).join('');
    
    document.getElementById('modalBuyBtn').onclick = () => {
        const sz = document.querySelector('input[name="sz"]:checked');
        if(!sz) return alert("Selecione o tamanho");
        window.open(`https://wa.me/${WHATS}?text=Quero o ${p[1]} tam ${sz.value}`, "_blank");
    };

    document.getElementById('modalAddCartBtn').onclick = () => addToCart(index);
    
    document.getElementById('productModal').classList.add('active');
    document.getElementById('overlay').classList.add('active');
}

function addToCart(index) {
    const p = products[index];
    const sz = document.querySelector('input[name="sz"]:checked');
    if(!sz && document.getElementById('productModal').classList.contains('active')) return alert("Selecione o tamanho primeiro!");
    
    const sizeValue = sz ? sz.value : "Padrão";
    cartItems.push({ name: p[1], price: p[2], size: sizeValue });
    updateCart();
    if(document.getElementById('productModal').classList.contains('active')) closeModal();
}

function updateCart() {
    const container = document.getElementById('cartItems');
    container.innerHTML = cartItems.map((item, i) => `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.8rem; border-bottom:1px solid #111; padding-bottom:5px;">
            <span>${item.name} (${item.size})</span>
            <span>R$ ${item.price.toFixed(2)} <i class="fas fa-trash" onclick="removeItem(${i})" style="margin-left:10px; cursor:pointer; color:#ff4444"></i></span>
        </div>
    `).join('');
    
    const total = cartItems.reduce((acc, item) => acc + item.price, 0);
    document.getElementById('cartTotal').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
    document.getElementById('count').innerText = cartItems.length;
}

function removeItem(i) { cartItems.splice(i, 1); updateCart(); }

function checkout() {
    if(cartItems.length === 0) return alert("Carrinho vazio!");
    let text = "Novo Pedido:\n";
    cartItems.forEach(item => text += `- ${item.name} (Tam: ${item.size}) - R$ ${item.price.toFixed(2)}\n`);
    const total = cartItems.reduce((acc, item) => acc + item.price, 0);
    text += `\nTotal: R$ ${total.toFixed(2)}`;
    window.open(`https://wa.me/${WHATS}?text=${encodeURIComponent(text)}`, "_blank");
}

function openModalByName(name) {
    const idx = products.findIndex(p => p[1] === name);
    if(idx !== -1) openModal(idx);
}

function closeModal() { document.getElementById('productModal').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }

function renderSection(title, list) {
    if(list.length === 0) return "";
    return `
        <div class="category-row">
            <h2 class="category-title">${title}</h2>
            <div class="grid-fixed">
                ${list.map(p => {
                    const idx = products.findIndex(pr => pr[1] === p[1] && pr[0] === p[0]);
                    return `<div class="product">
                        <div onclick="openModal(${idx})">
                            <div class="product-img-container"><img src="${p[0]}"></div>
                            <h3>${p[1]}</h3>
                            <span class="price">R$ ${p[2].toFixed(2).replace('.',',')}</span>
                        </div>
                        <button class="btn-add-cart-card" onclick="openModal(${idx})">🛒 ADICIONAR</button>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
}

function renderAll() {
    const content = document.getElementById('main-content');
    content.innerHTML = renderSection("Tênis Premium", products.filter(p => p[3] === 'tenis'));
    content.innerHTML += `
    <div class="featured-container">
        <div class="banner-track">
            ${pastas.destaques.map(b => `
                <div class="banner-slide">
                    <div class="banner-img-horiz"><img src="${b[0]}"></div>
                    <div class="banner-info-horiz">
                        <h2>${b[1]}</h2>
                        <span class="b-price">R$ ${b[2].toFixed(2).replace('.',',')}</span>
                        <a href="#" class="b-btn" onclick="openModalByName('${b[1]}')">GARANTIR</a>
                    </div>
                </div>
            `).join('')}
        </div>
    </div>`;
    content.innerHTML += renderSection("Camisas", products.filter(p => p[3] === 'camisas'));
    content.innerHTML += renderSection("Calças", products.filter(p => p[3] === 'calças'));
    content.innerHTML += renderSection("Shorts", products.filter(p => p[3] === 'shorts'));
    content.innerHTML += renderSection("Relógios", products.filter(p => p[3] === 'relogios'));
}

function renderByCategory(cat) { document.getElementById('main-content').innerHTML = renderSection(cat.toUpperCase(), products.filter(p => p[3] === cat)); }
function renderByBrand(brand) { document.getElementById('main-content').innerHTML = renderSection(brand.toUpperCase(), products.filter(p => p[0].toLowerCase().includes(brand.toLowerCase()))); }

renderAll();

let cur = 0;
setInterval(() => {
    const track = document.querySelector('.banner-track');
    if(track) { cur = (cur + 1) % pastas.destaques.length; track.style.transform = `translateX(-${cur * 100}%)`; }
}, 5000);
</script>
</body>
</html>
